<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CET-4 单词卡片 - {{GROUP_NAME}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            line-height: 1.6;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .word-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #667eea;
        }
        
        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        
        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .word-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .word-phonetic {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }
        
        .word-pos {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .word-meaning {
            color: #444;
            font-size: 15px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #eee;
        }
        
        .word-example {
            color: #666;
            font-size: 13px;
            font-style: italic;
            line-height: 1.5;
        }
        
        .word-example::before {
            content: '"';
            color: #667eea;
            font-size: 18px;
            margin-right: 2px;
        }
        
        .word-example::after {
            content: '"';
            color: #667eea;
            font-size: 18px;
            margin-left: 2px;
        }
        
        .word-roots {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #888;
        }
        
        .word-roots strong {
            color: #667eea;
        }
        
        .frequency-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .freq-high {
            background: #ff6b6b;
            color: white;
        }
        
        .freq-medium {
            background: #feca57;
            color: #333;
        }
        
        .freq-normal {
            background: #48dbfb;
            color: white;
        }
        
        @media print {
            body {
                background: white;
                padding: 10px;
            }
            
            .header {
                background: #667eea !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .word-card {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
        
        @media (max-width: 600px) {
            .card-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 CET-4 单词记忆卡片</h1>
        <p>{{GROUP_NAME}} | 按真题高频排序</p>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">{{TOTAL_WORDS}}</div>
                <div class="stat-label">总词汇</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">{{STUDY_DAYS}}</div>
                <div class="stat-label">建议天数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">{{DAILY_COUNT}}</div>
                <div class="stat-label">每日任务</div>
            </div>
        </div>
    </div>
    
    <div class="card-container">
        {{CARDS_CONTENT}}
    </div>
    
    <script>
        // 简单的翻转卡片效果
        document.querySelectorAll('.word-card').forEach(card => {
            card.addEventListener('click', function() {
                this.classList.toggle('flipped');
            });
        });
    </script>
</body>
</html>
